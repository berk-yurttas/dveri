  #     test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U ${MSSQL_USER} -P ${MSSQL_PASSWORD} -C -Q 'SELECT 1'"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  romiot-postgresql:
    image: postgres:16
    container_name: romiot-postgres-db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: romiotdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - romiot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sensor_default
    restart: unless-stopped

  ivme-postgresql:
    image: postgres:16
    container_name: ivme-postgres-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: ivmedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ivme_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sensor_default
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    env_file:
      - ./etl/.env
    container_name: clickhouse-server
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - sensor_default
    restart: unless-stopped
  transfer:
    build: ./etl
    env_file:
      - ./etl/.env
    container_name: python-clickhouse-app
    depends_on:
      clickhouse:
        condition: service_started
    environment:
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      MSSQL_HOST: ${MSSQL_HOST}
      MSSQL_PORT: ${MSSQL_PORT}
      MSSQL_USER: ${MSSQL_USER}
      MSSQL_PASSWORD: ${MSSQL_PASSWORD}
      MSSQL_DATABASE: master
    volumes:
      - ./etl:/app
    command: sh -c "while true; do echo 'Running transfer at '$(date); python transfer.py; echo 'Transfer completed, sleeping for 5 minutes...'; sleep 300; done"
    restart: unless-stopped

  dtbackend:
    container_name: dtbackend
    build:
      context: .
      dockerfile: dtbackend/Dockerfile
    ports:
      - "${DTBACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - dtbackend/.env
    networks:
      - sensor_default
    restart: unless-stopped

  dtfrontend:
    container_name: dtfrontend
    build:
      context: .
      dockerfile: dtfrontend/Dockerfile
    ports:
      - "${DTFRONTEND_PORT}:3000"
    depends_on:
      - dtbackend
    env_file:
      - dtfrontend/.env
    # --- Runtime hardening (defense-in-depth; the real fix is the patched Next.js) ---
    user: "1000:1000"                 # never run as root (the image's `node` user)
    read_only: true                   # immutable root fs: blocks dropping miners/binaries
    tmpfs:                            # the only writable paths the standalone server needs
      - /tmp
      - /app/.next/cache
    security_opt:
      - no-new-privileges:true        # block setuid privilege escalation
    cap_drop:
      - ALL                           # drop all Linux capabilities
    pids_limit: 256                   # cap fork bombs / process flooding
    mem_limit: 1g                     # cap memory (starves a cryptominer)
    cpus: 2.0                         # cap CPU (a miner can no longer peg every core)
    restart: unless-stopped
    # NOTE: also restrict egress at the network/firewall layer. This attack pulled the
    # miner from 221.156.167.200:9090 and beaconed to 141.95.72.59:443 — an outbound
    # allowlist (only your backend/APIs) would have blocked both.
volumes:
  postgres_data:
  clickhouse_data:
  mssql_data:
  ivme_postgres_data:
  romiot_postgres_data:

networks:
  sensor_default:
    external: true